<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="/static/web/static/css/style.css">
</head>
<body class="center-body">
    <div class="card auth-card">
        <div style="text-align: center; margin-bottom: 24px;">
            <span class="material-symbols-rounded" style="font-size: 48px; color: var(--md-primary);">lock</span>
            <h2 style="margin-top: 16px;">Welcome Back</h2>
        </div>
        {{if .Error}}
        <div class="alert error">
            <span class="material-symbols-rounded">error</span> {{.Error}}
        </div>
        {{end}}
        <form method="POST">
            {{.CSRFField}}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="margin-top: 16px;">
                <span class="material-symbols-rounded">login</span> Login
            </button>
        </form>
    </div>
</body>
</html>
